<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Content Moderation</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298, #6a11cb);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #333;
}

/* Glass Card */
.container {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px);
    padding: 30px;
    border-radius: 16px;
    width: 420px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    text-align: center;
    color: white;
    transition: 0.3s;
}

.container:hover {
    transform: translateY(-5px);
}

/* Header */
h1 {
    margin: 0;
    font-size: 22px;
}

.subtitle {
    font-size: 13px;
    opacity: 0.8;
    margin-bottom: 20px;
}

/* Textarea */
textarea {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 14px;
    resize: none;
    transition: 0.3s;
}

textarea:focus {
    box-shadow: 0 0 10px #00c6ff;
}

/* Character Counter */
.counter {
    font-size: 12px;
    text-align: right;
    margin-top: 5px;
    opacity: 0.7;
}

/* Button */
button {
    margin-top: 15px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.03);
    box-shadow: 0 0 15px rgba(0,198,255,0.7);
}

/* Loading Spinner */
.loader {
    display: none;
    margin-top: 15px;
}

.loader div {
    width: 10px;
    height: 10px;
    background: white;
    border-radius: 50%;
    display: inline-block;
    animation: bounce 0.6s infinite alternate;
}

.loader div:nth-child(2) {
    animation-delay: 0.2s;
}
.loader div:nth-child(3) {
    animation-delay: 0.4s;
}

@keyframes bounce {
    to { transform: translateY(-8px); }
}

/* Result */
.result {
    margin-top: 20px;
    padding: 10px;
    border-radius: 10px;
    font-weight: bold;
}

/* Safe / Unsafe Colors */
.safe {
    background: rgba(0,255,150,0.2);
    color: #00ff99;
}

.unsafe {
    background: rgba(255,0,80,0.2);
    color: #ff4d6d;
}

/* Progress Bar */
.progress {
    height: 6px;
    background: rgba(255,255,255,0.3);
    border-radius: 10px;
    margin-top: 8px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    background: #00ffcc;
    width: 0%;
}

/* Footer */
.footer {
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.7;
}

/* Dark Mode Toggle */
.toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    cursor: pointer;
    color: white;
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleMode()">
    <i class="fas fa-moon"></i>
</div>

<div class="container">
    <h1><i class="fas fa-robot"></i> AI Moderation</h1>
    <div class="subtitle">AI-powered content safety system</div>

    <form method="POST" onsubmit="showLoader()">
        <textarea name="text" id="text" rows="5" placeholder="Enter text..." required></textarea>
        <div class="counter" id="counter">0 characters</div>
        <button type="submit"><i class="fas fa-shield-alt"></i> Analyze</button>
    </form>

    <!-- Loader -->
    <div class="loader" id="loader">
        <div></div><div></div><div></div>
    </div>

    <!-- Result -->
    {% if result %}
    <div class="result {{ 'safe' if result == 'Safe' else 'unsafe' }}">
        {{ result }}

        <div class="progress">
            <div class="progress-bar" id="progressBar" data-confidence="{{ confidence|default(0, true) }}"></div>
        </div>

        <small>{{ confidence|default(0, true) }}% confidence</small>
    </div>
    {% endif %}

    <div class="footer">
        Powered by NLP & Machine Learning
    </div>
</div>

<script>
// Character Counter
document.getElementById("text").addEventListener("input", function() {
    document.getElementById("counter").innerText = this.value.length + " characters";
});

// Loader
function showLoader() {
    document.getElementById("loader").style.display = "block";
}

// Dark Mode Toggle
function toggleMode() {
    document.body.classList.toggle("dark");
}

const progressBar = document.getElementById("progressBar");
if (progressBar) {
    const confidence = Number(progressBar.dataset.confidence || 0);
    progressBar.style.width = `${Math.max(0, Math.min(100, confidence))}%`;
}
</script>

</body>
</html>
